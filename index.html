<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Business Name | City</title>
  <meta name="description" content="Professional services in City. Call for a free quote.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="container">
  <h1>Business Name</h1>
  <a href="#contact" class="btn">Get a Quote</a>
</header>

<section class="hero container">
  <h2>Professional [Service] in [City]</h2>
  <p>Fast, affordable, and reliable service you can trust.</p>
  <a href="#contact" class="btn">Request a Quote</a>
</section>

<section class="services container">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="card">Service 1</div>
    <div class="card">Service 2</div>
    <div class="card">Service 3</div>
  </div>
</section>

<section class="about container">
  <h2>About Us</h2>
  <p>We provide high-quality service with a focus on customer satisfaction.</p>
</section>

<section id="contact" class="contact container">
  <h2>Contact Us</h2>
  <form action="https://formspree.io/f/YOUR-ID" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

<footer class="container">
  <p>© 2026 Business Name</p>
</footer>

</body>
</html>
