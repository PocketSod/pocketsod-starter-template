<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <title>Business Name | City</title>
  <meta name="description" content="Professional services in City. Call for a free quote.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="inner">
    <h1>Business Name</h1>
    <a href="#contact" class="btn">Get a Quote</a>
  </div>
</header>

<section class="hero container fade-in delay-1">
  <h2>Professional [Service] in [City]</h2>
  <p>Fast, affordable, and reliable service you can trust.</p>
  <a href="#contact" class="btn">Request a Quote</a>
</section>

<section class="services container fade-in delay-2">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="card">Service 1</div>
    <div class="card">Service 2</div>
    <div class="card">Service 3</div>
  </div>
</section>

<section class="about container fade-in delay-3">
  <h2>Why Choose Us</h2>
  <div class="grid">
    <div class="card">Fast Service</div>
    <div class="card">Affordable Pricing</div>
    <div class="card">Trusted Locally</div>
  </div>
</section>

<section id="contact" class="container fade-in">
  <h2>Get a Free Quote</h2>
  <form action="https://formspree.io/f/YOUR-ID" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <textarea name="message" placeholder="Message"></textarea>
    <button class="btn" type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>© 2026 Business Name</p>
</footer>

</body>
</html>
